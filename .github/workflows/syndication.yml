name: POSSE syndication

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: posse-syndication
  cancel-in-progress: false

jobs:
  syndicate:
    runs-on: ubuntu-latest
    env:
      JEKYLL_ENV: production
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      # - name: Cleaning bad URIs cache
      #   run: rm -f _data/webmentions/bad_uris.yml

      - name: Send webmentions
        run: |
          bundle exec jekyll build
          bundle exec jekyll webmention

      - name: Commits updated cache
        run: |
          git config user.name "webmention-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/webmentions
          if git diff --staged --quiet; then
            echo "Nothing new to cache, skipping commit."
          else
            git commit -m "chore(webmentions): syndication update"
            git push
          fi
