name: Build, deploy & syndicate

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      posts_changed: ${{ steps.detect.outputs.posts_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for jekyll-last-modified-at

      - name: Detect changed posts
        id: detect
        run: |
          if git rev-parse HEAD~1 &>/dev/null; then
            git diff --name-only HEAD~1 HEAD -- '_posts/*.md' > changed_posts.txt
          else
            git show --name-only --format="" HEAD -- '_posts/*.md' > changed_posts.txt
          fi
          if [ -s changed_posts.txt ]; then
            echo "posts_changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed posts:"
            cat changed_posts.txt
          else
            echo "posts_changed=false" >> "$GITHUB_OUTPUT"
            echo "No post changes in this push."
          fi

      - name: Upload changed posts list
        if: steps.detect.outputs.posts_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changed-posts
          path: changed_posts.txt
          retention-days: 1

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - uses: actions/cache@v4
        with:
          path: .jekyll-cache
          key: jekyll-cache-${{ github.run_id }}
          restore-keys: jekyll-cache-

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=arthrfrts --branch=main

  syndicate:
    needs: deploy
    if: needs.deploy.outputs.posts_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Download changed posts list
        uses: actions/download-artifact@v4
        with:
          name: changed-posts

      - name: Wait for edge propagation
        run: sleep 45

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests python-frontmatter

      - name: Syndicate via Bridgy
        run: python .github/scripts/syndicate.py --from-file changed_posts.txt
        env:
          SITE_URL: https://arthr.me

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add syndication URLs"
          file_pattern: "_posts/*.md"
