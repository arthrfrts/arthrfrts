# Site settings
title: Arthur Freitas
tagline: Faço sites e vejo filmes.
description: Nada faz muito sentido.

url: https://arthr.me
baseurl: ""

lang: pt-BR
timezone: America/Sao_Paulo
encoding: utf-8

logo: "/uploads/avatar.png"

author:
  name: Arthur Freitas
  uri: https://arthr.me
  email: "arthur@arthr.me"
  mastodon: "@arthr@organica.social"

# Theme Settings
theme: linus

date_formats:
  day: "%d/%m/%y"
  month: "%m/%y"
  year: "%Y"

category_colors:
  - name: Esquinas
    color: "#FF7A2F"
  - name: Notas
    color: "#2ECC71"
  - name: Links
    color: "#3B9EFF"
  - name: Fotos
    color: "#FFD000"

main_menu:
  title: Navegar
  items:
    - url: "/"
      label: Posts
    - url: "/sobre/"
      label: Sobre
    - url: "/arquivo/"
      label: Arquivo
    - url: "/wander/"
      label: Descobertas

footer_menu:
  title: Onde me encontrar
  items:
    - url: "/feed.xml"
      rel: alternate
      label: RSS
    - url: "/feed.json"
      rel: alternate
      label: JSON Feed
    - url: "https://bsky.app/profile/arthr.me"
      rel: me
      label: Bluesky
      external: true
    - url: "https://www.flickr.com/photos/arthrfrts"
      rel: me
      label: Flickr
      external: true
    - url: "https://www.last.fm/user/arthrfrts"
      rel: me
      label: Last.FM
      external: true
    - url: "https://letterboxd.com/arthrfrts"
      rel: me
      label: Letterboxd
      external: true

translations:
  byline: "Por"
  archive_date_title: "Arquivos de %date"
  archive_tag_title: "Posts marcados com “%tag”"
  archive_category_title: "Arquivo de %category"
  blog_pagination_title: "Paginação do blog"
  blog_pagination_prev_page: "Página anterior"
  blog_pagination_next_page: "Próxima página"

# Build settings
permalink: "/:categories/:year/:month/:day/:title/"

paginate: 6
paginate_path: "/p:num/"

include:
  - _redirects

# Plugins settings
plugins:
  - jekyll-webmention_io
  - jekyll-compose

# Plugin: jekyll-webmention_io
webmentions:
  username: arthr.me
  cache_folder: _data/webmentions
  syndication:
    bluesky:
      endpoint: https://brid.gy/publish/bluesky
      response_mapping:
        syndication: $.url
    mastodon:
      endpoint: https://brid.gy/publish/mastodon
      response_mapping:
        syndication: $.url
    flickr:
      endpoint: https://brid.gy/publish/flickr
      response_mapping:
        syndication: $.url
  templates:
    webmentions: _includes/webmentions.html
  legacy_domains:
    - https://arthrfrts.tumblr.com
    - https://irrelefante.tumblr.com
  throttle_lookups:
    last_week: daily
    last_month: weekly
    last_year: every 2 weeks
    older: monthly
  cache_bad_uris_for: 5
  bad_uri_policy:
    default:
      policy: retry
      max_attempts: 5

# Plugin: jekyll-seo-tag
seo:
  name: Arthur Freitas
  links:
    - https://bsky.app/profile/arthr.me
    - https://github.com/arthrfrts
    - https://www.last.fm/user/arthrfrts
    - https://www.flickr.com/people/arthrfrts/
    - https://letterboxd.com/arthrfrts
    - https://tangled.org/arthr.me
    - https://arthrfrts.tumblr.com
    - https://www.linkedin.com/in/arthrfrts
    - https://organica.social/@arthr

# Plugin: jekyll-archives
jekyll-archives:
  permalinks:
    tags: /tag/:name
    category: /:name/

# Plugin: jekyll-compose
jekyll_compose:
  default_front_matter:
    drafts:
      category: Notas
      tags:
    posts:
      category:
      tags:
